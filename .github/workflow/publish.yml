name: Build and Publish Static Site

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add SPA fallback .htaccess
        run: |
          cat > dist/.htaccess <<'EOF'
          RewriteEngine On
          RewriteBase /
          RewriteRule ^index\.html$ - [L]
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule . /index.html [L]
          EOF

      - name: Publish build output to deploy branch
        shell: bash
        run: |
          set -e

          rm -rf /tmp/deploy-site /tmp/deploy-repo
          mkdir -p /tmp/deploy-site /tmp/deploy-repo

          shopt -s dotglob
          cp -r dist/* /tmp/deploy-site/

          cd /tmp/deploy-repo
          git init
          git checkout -b deploy

          cp -r /tmp/deploy-site/* .

          touch .nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Deploy static build from ${GITHUB_SHA}"

          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin deploy

      - name: Trigger Hostinger deployment
        run: curl -X POST "${{ secrets.HOSTINGER_WEBHOOK_URL }}"