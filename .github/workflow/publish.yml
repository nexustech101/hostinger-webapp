name: Build and Publish Static Site

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish dist/spa to deploy-branch
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/deploy-site
          mkdir -p /tmp/deploy-site

          shopt -s dotglob
          cp -r dist/spa/* /tmp/deploy-site/

          git checkout --orphan deploy-branch
          git rm -rf . || true

          cp -r /tmp/deploy-site/* .
          touch .nojekyll

          git add .
          git commit -m "Deploy static build from ${GITHUB_SHA}"
          git push -f origin deploy-branch